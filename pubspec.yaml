name: push
description: Application de promotion événementielle
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.3.0

  # Images & Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  http: ^1.2.2

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # UI Components
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # ✅ intl aligné sur le SDK Flutter
  intl: ^0.20.2

  # Utils
  uuid: ^4.5.1
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  share_plus: ^10.0.3

  # ✅ CORRECTION PRINCIPALE
  flutter_form_builder: ^10.3.0+2    # ← 10.x supporte intl 0.20.2
  form_builder_validators: ^11.0.0   # ← Compatible avec form_builder 10.x

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600